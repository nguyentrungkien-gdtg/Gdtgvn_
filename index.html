<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Trung Kiên | Admin Trung Gian</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --blue: #00d2ff; --dark: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #020617;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px 15px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .avatar {
            width: 120px; height: 120px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        h1 { color: var(--gold); font-size: 1.4rem; margin-bottom: 10px; }
        .badge {
            background: #ffcc00; color: #000;
            font-weight: 800; padding: 6px 15px;
            border-radius: 20px; font-size: 0.8rem;
            margin-bottom: 20px; display: inline-block;
        }
        .btn {
            background: #334155; padding: 12px;
            border-radius: 12px; margin-bottom: 10px;
            display: flex; align-items: center;
            text-decoration: none; color: #fff;
        }
        .btn i { font-size: 1.2rem; margin-right: 15px; color: var(--blue); }
        .btn b { font-size: 0.9rem; }
        .note { color: #ef4444; font-size: 0.75rem; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">
            <img src="avatar.jpg" alt="Nguyễn Trung Kiên">
        </div>
        <h1>NGUYỄN TRUNG KIÊN</h1>
        <div class="badge">🛡️ ADMIN TG BẢO HIỂM 10M</div>
        <div class="links">
            <a href="https://facebook.com/trungkien1669" class="btn" target="_blank">
                <i class="fab fa-facebook"></i>
                <div style="text-align: left;"><b>trungkien1669</b></div>
            </a>
            <a href="https://zalo.me/0365951114" class="btn" target="_blank">
                <i class="fas fa-comment-dots"></i>
                <div style="text-align: left;"><b>0365951114</b></div>
            </a>
            <div class="btn">
                <i class="fas fa-check-circle" style="color: var(--gold);"></i>
                <div style="text-align: left;"><b>UY TÍN - AN TOÀN</b></div>
            </div>
        </div>
        <p class="note">⚠️ Check kỹ thông tin trước khi giao dịch!</p>
    </div>
</body>
</html>
